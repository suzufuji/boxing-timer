<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Boxing Timer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background-color: #1a1a1a; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 100vh; padding: 40px 20px; overflow: hidden; }
        .status-badge { background-color: #333; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border: 2px solid #555; transition: all 0.3s ease; }
        .status-ready { background-color: #0288d1; border-color: #03a9f4; color: white; box-shadow: 0 0 15px rgba(3, 169, 244, 0.4); }
        .status-round { background-color: #d32f2f; border-color: #f44336; color: white; box-shadow: 0 0 15px rgba(244, 67, 54, 0.4); }
        .status-interval { background-color: #388e3c; border-color: #4caf50; color: white; box-shadow: 0 0 15px rgba(76, 175, 80, 0.4); }
        .timer-display { font-size: 5.5rem; font-weight: 800; font-variant-numeric: tabular-nums; margin: 20px 0; letter-spacing: -2px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .round-counter { font-size: 1.5rem; color: #aaa; font-weight: 500; }
        .controls { display: flex; gap: 20px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.96); }
        .btn-start { background-color: #ff9800; color: #000; }
        .btn-pause { background-color: #757575; color: #fff; }
        .btn-reset { background-color: #212121; color: #f44336; border: 1px solid #f44336; }
        .settings { width: 100%; max-width: 400px; background: #262626; padding: 15px; border-radius: 12px; font-size: 0.9rem; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-row input { background: #333; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 6px; width: 70px; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="statusBadge" class="status-badge">READY</div>

    <div>
        <div id="timerDisplay" class="timer-display">03:00</div>
        <div style="text-align: center;">
            <span id="roundCounter" class="round-counter">ROUND 1</span>
        </div>
    </div>

    <div class="settings" id="settingsArea">
        <div class="setting-row">
            <label>ラウンド時間 (秒):</label>
            <input type="number" id="roundInput" value="180" min="10">
        </div>
        <div class="setting-row">
            <label>インターバル時間 (秒):</label>
            <input type="number" id="intervalInput" value="60" min="5">
        </div>
    </div>

    <div class="controls">
        <button id="resetBtn" class="btn-reset">RESET</button>
        <button id="startBtn" class="btn-start">START</button>
    </div>

    <script>
        let currentMode = 'READY'; let previousMode = 'READY'; let timeRemaining = 180; let currentRound = 1; let timerInterval = null;
        let audioCtx = null; let silentKeepAliveNode = null;
        
        // サーバーからダイレクトロードする音声バッファ
        let startGongBuffer = null; let endGongBuffer = null;

        const statusBadge = document.getElementById('statusBadge');
        const timerDisplay = document.getElementById('timerDisplay');
        const roundCounter = document.getElementById('roundCounter');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const settingsArea = document.getElementById('settingsArea');
        const roundInput = document.getElementById('roundInput');
        const intervalInput = document.getElementById('intervalInput');

        // 【アプデ：起動時にサーバーからmp3を自動で直接一本釣りするハックだなぜ！】
        window.addEventListener('DOMContentLoaded', () => {
            fetchAndDecodeAudio('gong_start.mp3', (buffer) => { startGongBuffer = buffer; });
            fetchAndDecodeAudio('gong_end.mp3', (buffer) => { endGongBuffer = buffer; });
        });

        function updateDisplay() {
            let mins = Math.floor(timeRemaining / 60); let secs = timeRemaining % 60;
            timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            roundCounter.textContent = `ROUND ${currentRound}`;
        }

        function initAudioEnvironment() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            if (!silentKeepAliveNode) {
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                silentKeepAliveNode = audioCtx.createBufferSource();
                silentKeepAliveNode.buffer = buffer; silentKeepAliveNode.loop = true;
                silentKeepAliveNode.connect(audioCtx.destination); silentKeepAliveNode.start(audioCtx.currentTime);
            }
        }

        // サーバーから通信経由でmp3をロードしてデコードする関数
        function fetchAndDecodeAudio(url, callback) {
            fetch(url)
                .then(response => response.arrayBuffer())
                .then(arrayBuffer => {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                        callback(buffer);
                    }, (err) => console.log("Fetch decode error:", err));
                })
                .catch(e => console.log("Fetch network error:", e));
        }

        function triggerGong(type) {
            try {
                initAudioEnvironment();
                const targetBuffer = (type === 'start') ? startGongBuffer : endGongBuffer;
                if (targetBuffer) {
                    const soundSource = audioCtx.createBufferSource();
                    soundSource.buffer = targetBuffer; soundSource.connect(audioCtx.destination);
                    soundSource.start(audioCtx.currentTime);
                } else {
                    // 万が一ロードが間に合わなかった時の電子バックアップ音
                    const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(type === 'start' ? 440 : 350, now);
                    gain.gain.setValueAtTime(0.7, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 1.5);
                }
            } catch (e) { console.log("Gong error:", e); }
        }

        function triggerBeep() {
            try {
                initAudioEnvironment(); const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.08);
            } catch(e){}
        }

        function speak(text) {
            try {
                initAudioEnvironment(); const synth = window.speechSynthesis; if (synth.speaking) { synth.cancel(); }
                const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'ja-JP'; utterance.rate = 1.15; synth.speak(utterance);
            } catch(e){}
        }

        function tick() {
            timeRemaining--;
            if (currentMode === 'PREPARE') {
                if (timeRemaining > 0) { triggerBeep(); }
                else if (timeRemaining <= 0) {
                    clearInterval(timerInterval); currentMode = 'ROUND'; timeRemaining = parseInt(roundInput.value);
                    statusBadge.textContent = 'ROUND'; statusBadge.className = 'status-badge status-round';
                    triggerGong('start'); updateDisplay(); timerInterval = setInterval(tick, 1000); return;
                }
            }
            if (currentMode === 'ROUND') {
                if (timeRemaining === 90) { speak("ハーフ"); }
                else if (timeRemaining === 30) { speak("ラストさんじゅう"); }
                else if (timeRemaining <= 0) {
                    clearInterval(timerInterval); currentMode = 'INTERVAL'; timeRemaining = parseInt(intervalInput.value);
                    statusBadge.textContent = 'INTERVAL'; statusBadge.className = 'status-badge status-interval';
                    triggerGong('end'); updateDisplay();
                    setTimeout(() => { if (currentMode === 'INTERVAL') timerInterval = setInterval(tick, 1000); }, 2000); return;
                }
            }
            if (currentMode === 'INTERVAL') {
                if (timeRemaining <= 5 && timeRemaining > 0) triggerBeep();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval); currentRound++; currentMode = 'ROUND'; timeRemaining = parseInt(roundInput.value);
                    statusBadge.textContent = 'ROUND'; statusBadge.className = 'status-badge status-round';
                    triggerGong('start'); updateDisplay(); timerInterval = setInterval(tick, 1000); return;
                }
            }
            updateDisplay();
        }

        function startTimer() {
            initAudioEnvironment(); settingsArea.style.pointerEvents = 'none'; settingsArea.style.opacity = '0.5';
            if (currentMode === 'READY') { currentMode = 'PREPARE'; timeRemaining = 5; statusBadge.textContent = 'PREPARE'; statusBadge.className = 'status-badge status-ready'; triggerBeep(); }
            else if (currentMode === 'PAUSED') {
                currentMode = previousMode;
                if (currentMode === 'ROUND') { statusBadge.textContent = 'ROUND'; statusBadge.className = 'status-badge status-round'; }
                else if (currentMode === 'INTERVAL') { statusBadge.textContent = 'INTERVAL'; statusBadge.className = 'status-badge status-interval'; }
                else { statusBadge.textContent = 'PREPARE'; statusBadge.className = 'status-badge status-ready'; }
            }
            startBtn.textContent = 'PAUSE'; startBtn.className = 'btn-pause'; updateDisplay(); timerInterval = setInterval(tick, 1000);
        }

        function pauseTimer() { clearInterval(timerInterval); previousMode = currentMode; currentMode = 'PAUSED'; startBtn.textContent = 'START'; startBtn.className = 'btn-start'; statusBadge.textContent = 'PAUSED'; statusBadge.className = 'status-badge'; }

        startBtn.addEventListener('click', () => { if (currentMode === 'ROUND' || currentMode === 'INTERVAL' || currentMode === 'PREPARE') pauseTimer(); else startTimer(); });
        resetBtn.addEventListener('click', () => {
            initAudioEnvironment(); clearInterval(timerInterval); currentMode = 'READY'; previousMode = 'READY'; currentRound = 1; timeRemaining = parseInt(roundInput.value);
            startBtn.textContent = 'START'; startBtn.className = 'btn-start'; statusBadge.textContent = 'READY'; statusBadge.className = 'status-badge'; settingsArea.style.pointerEvents = 'auto'; settingsArea.style.opacity = '1'; updateDisplay();
        });

        timeRemaining = parseInt(roundInput.value); updateDisplay();
    </script>
</body>
</html>
